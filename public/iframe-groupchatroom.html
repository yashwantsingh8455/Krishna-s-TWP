    /* --- 🛠️ Standard Modal Styling --- */

    .logout-btn-header {

<body>

  <div id="login">
    <div class="login-box">
      <input type="text" id="username" placeholder="Enter your username" maxlength="20"/>
      <input type="text" id="userBio" placeholder="Bio (e.g. Coding, Music)" maxlength="15"/>
      <button id="loginBtn">Join Chat</button>
      <p id="loginError" style="color: #ff6b6b;"></p>
    </div>
  </div>

  <div id="chat">
    <div class="chatHeader">
      <div class="header-title">Chat :-</div>

      <div class="header-actions">
        <button class="header-icon-btn" title="Recent Messages" onclick="showRecentMessages()">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </button>

        <button class="header-icon-btn" title="Settings" onclick="openSettings()">
          <i class="fa-solid fa-gear"></i>
        </button>

        <button class="logout-btn-header" onclick="logout()">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>

    <div id="chatContainer">
      <div id="chatArea" style="position: relative;">
        <div id="settingsPage">
          <div class="settings-header">
            <span><i class="fa-solid fa-gear"></i> Settings</span>
            <span class="close-btn" onclick="closeSettings()">&times;</span>
          </div>
          <div class="settings-content">
            <div class="setting-item">
              <label>Update Username</label>
              <input type="text" id="updateName" placeholder="Your Name" maxlength="20">
            </div>
            <div class="setting-item">
              <label>Update Interest / Bio</label>
              <input type="text" id="updateBio" placeholder="e.g. Gaming, Music" maxlength="15">
            </div>
            <button class="save-settings-btn" onclick="saveSettings()">Save Settings</button>
          </div>
        </div>

        <div id="chatWindow"></div>

        <div id="replyPreview">
          <span id="replyText"></span>
          <span class="close-reply" onclick="cancelReply()">×</span>
        </div>

        <div id="inputSection" onclick="document.getElementById('input').focus()">
          <div class="input-container-main">
            <textarea id="input" placeholder="Enter message here" rows="1" oninput="autoGrow(this)"></textarea>
            <div class="inline-actions">
              <button id="emojiToggle" title="Emojis"><i class="fa-regular fa-face-smile"></i></button>
              <button id="voiceBtn" title="Record Voice"><i class="fa-solid fa-microphone-lines"></i></button>
              <button id="mediaBtn" onclick="document.getElementById('mediaInput').click()" title="Upload Media">
                <i class="fa-solid fa-paperclip"></i>
              </button>
              <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none;">
            </div>
          </div>
          <button id="send" title="Send Message">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </div>
      <div id="userList" style="position:relative; padding:10px;">
        <div id="interestDisplay">
          <span class="close-interest" onclick="closeInterestBox()">&times;</span>
          <div id="intContent">Click a user to see interest</div>
        </div>

        <h4 style="margin-top:10px; margin-bottom:10px; color: #333;">Users :-</h4>

        <div id="users"></div>

        <div class="extra-section">
          <p><em>-- New Content --</em></p>
        </div>
      </div>
    </div>
  </div>

  <audio id="notifSound" src="https://cdn.glitch.global/StrangertoStranger/sound.mp3?v=1234567890"
    preload="auto"></audio>

  <div id="userOverlay">
    <div class="overlay-header">
      <span>Online Users</span>
      <button onclick="closeUserOverlay()">×</button>
    </div>
    <div class="overlay-body" id="overlayUsers"></div>
  </div>

  <div id="customMenu">
    <ul>
      <li onclick="location.reload()">🔄 Refresh</li>
      <li onclick="history.back()">⬅️ Back</li>
      <li onclick="history.forward()">➡️ Forward</li>
    </ul>
  </div>







  <div id="deleteModal" class="modal-overlay">
    <div class="modal-box">
      <h3>Delete message?</h3>
      <p>Are you sure you want to delete this message for everyone?</p>
      <div class="modal-buttons">
        <button id="cancelDelBtn" class="btn-secondary">Cancel</button>
        <button id="confirmDelBtn" class="btn-primary">Delete</button>
      </div>
    </div>
  </div>






  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    // --- 🗑️ DELETE MODAL CONTROLLER ---
    let pendingDeleteId = null;

    const delModal = document.getElementById('deleteModal');
    const confirmBtn = document.getElementById('confirmDelBtn');
    const cancelBtn = document.getElementById('cancelDelBtn');

    function closeDeleteModal() {
      delModal.style.display = 'none';
      pendingDeleteId = null;
    }

    // Jab 'Haan' dabayein
    confirmBtn.onclick = () => {
      if (pendingDeleteId) {
        socket.emit('delete message', pendingDeleteId);
        closeDeleteModal();
      }
    };

    // Jab 'Nahi' dabayein
    cancelBtn.onclick = closeDeleteModal;
    const login = document.getElementById('login');
    const chat = document.getElementById('chat');
    const usernameInput = document.getElementById('username');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const chatWindow = document.getElementById('chatWindow');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const replyPreview = document.getElementById('replyPreview');
    const replyText = document.getElementById('replyText');
    const usersDiv = document.getElementById('users');
    const emojiBtn = document.getElementById('emojiToggle');
    const emojiPicker = document.getElementById('emojiPicker');

    // 🎤 New Media Selectors
    const mediaInput = document.getElementById('mediaInput');
    const mediaBtn = document.getElementById('mediaBtn');
    const voiceBtn = document.getElementById('voiceBtn');

    function autoScroll() {
      const cw = document.getElementById('chatWindow');
      cw.scrollTop = cw.scrollHeight;
    }





    // 🗑️ Server se delete signal receive karna
    socket.on('delete message', (id) => {
      const element = document.querySelector(`[data-id="${id}"]`);
      if (element) element.remove();
    });




    // After appendMessage(data...)
    autoScroll();

    let currentUser = '';
    let replyData = null;
    let mediaRecorder; // 🎤 Global for voice
    let audioChunks = [];

    // Jab page refresh ho, toh localStorage se naya wala naam uthayein
    const savedName = localStorage.getItem('username');
    const savedBio = localStorage.getItem('userBio') || "No bio added";

    if (savedName) {
      currentUser = savedName;
      // Server ko naya wala naam bhejein join karne ke liye
      socket.emit('join', { name: savedName, bio: savedBio });
    } else {
      login.style.display = 'flex';
    }

    loginBtn.onclick = () => {
      const name = usernameInput.value.trim();
      const bio = document.getElementById('userBio').value.trim() || "No bio added";

      if (!name) return;

      currentUser = name;
      // Bio ko localStorage mein save karein taaki refresh par yaad rahe
      localStorage.setItem('username', name);
      localStorage.setItem('userBio', bio);

      // Server ko name aur bio dono bhejein
      socket.emit('join', { name: name, bio: bio });
    };

    if (document.hidden) {
      document.title = '🔔 New message!';
      setTimeout(() => { document.title = 'StrangertoStranger'; }, 3000);
    }

    socket.on('duplicate', (message) => {
      // Agar login page par hai
      if (login.style.display !== 'none') {
        loginError.textContent = '❌ ' + message;
      } else {
        // Agar settings page par hai
        alert(message);
      }
    });

    // index.html JS
    socket.on('joined', () => {
      login.style.display = 'none';
      chat.style.display = 'flex';
      localStorage.setItem('username', currentUser); // <-- Ensure this runs!
    });

    sendBtn.onclick = sendMessage;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      // ✨ Har message ke liye unique ID
      const msgId = Date.now().toString() + Math.random().toString(36).substr(2, 5);

      const data = { id: msgId, sender: currentUser, message, replyTo: replyData, type: 'text' };
      socket.emit('chat message', data);
      appendMessage(data, true);
      input.value = '';
      cancelReply();
      input.style.height = 'auto';
    }

    // index.html JS file ke andar
    // index.html ke script mein
    socket.on('chat message', data => {
      // Humne server par 'broadcast' use kiya hai, 
      // isliye yahan sender check ki zarurat nahi hai (duplicate nahi hoga)
      appendMessage(data, false);

      // Play sound logic
      const sound = document.getElementById("notifSound");
      if (sound) {
        sound.currentTime = 0;
        sound.play().catch(err => console.warn("Audio blocked", err));
      }
    });






    function appendMessage(data, isMe) {
      // 1. Container setup with Unique ID
      const container = document.createElement('div');
      container.className = 'message-container';
      container.setAttribute('data-id', data.id); // 🆔 Important for Delete for Everyone

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isMe ? 'me' : 'other'}`;

      // 2. Mentions Logic (@Name click)
      if (!isMe) {
        const label = document.createElement('div');
        label.className = 'username-label';
        label.textContent = data.sender;
        label.onclick = () => insertMention(data.sender);
        msgDiv.appendChild(label);
      }

      // 3. Reply Block (Visual Reference)
      if (data.replyTo) {
        const replyBlock = document.createElement('div');
        replyBlock.className = 'reply-block';
        replyBlock.textContent = `${data.replyTo.sender}: ${data.replyTo.message.substring(0, 30)}...`;
        msgDiv.appendChild(replyBlock);
      }

      // 4. Media Rendering + 🛡️ Anti-Download Security
      if (data.type === 'image') {
        const img = document.createElement('img');
        img.src = data.message;
        img.style.pointerEvents = 'none'; // 🚫 Click disable
        img.oncontextmenu = (e) => e.preventDefault(); // 🚫 Right click block
        msgDiv.appendChild(img);
      } else if (data.type === 'video') {
        const video = document.createElement('video');
        video.src = data.message;
        video.controls = true;
        video.setAttribute('controlsList', 'nodownload'); // 🚫 Hide Download Button
        video.oncontextmenu = (e) => e.preventDefault();
        msgDiv.appendChild(video);
      } else if (data.type === 'audio') {
        const audio = document.createElement('audio');
        audio.src = data.message;
        audio.controls = true;
        audio.setAttribute('controlsList', 'nodownload');
        audio.oncontextmenu = (e) => e.preventDefault();
        msgDiv.appendChild(audio);
      } else {
        // Text & Mention Formatting
        const textDiv = document.createElement('div');
        const formatted = (data.message || "").replace(/@([^@:]+):/g, (_, name) =>
          `<span style="color:#3f51b5; font-weight:bold; cursor:pointer;" onclick="insertMention('${name}')">@${name}:</span>`);
        textDiv.innerHTML = formatted;
        msgDiv.appendChild(textDiv);
      }

      // 5. ⋮ Custom Menu (Reply & Delete)
      const menuBtn = document.createElement('button');
      menuBtn.className = 'menu-btn';
      menuBtn.innerHTML = '⋮';

      const menu = document.createElement('div');
      menu.className = 'message-menu';

      // Reply Option
      const rBtn = document.createElement('button');
      rBtn.innerHTML = '<i class="fa-solid fa-reply"></i> Reply';
      rBtn.onclick = () => {
        setReply(data.sender, data.type === 'text' ? data.message : `sent a ${data.type}`);
        menu.style.display = 'none';
      };
      menu.appendChild(rBtn);

      // 👑 Delete Logic (User can delete own, Admin can delete ALL)
      // "Yashwant" ki jagah apna actual username likhein jo aap use karte hain
      const isAdmin = (currentUser === "Yashwant");

      if (isMe || isAdmin) {
        const dBtn = document.createElement('button');
        dBtn.innerHTML = '<i class="fa-solid fa-trash"></i> Delete for All';
        dBtn.style.color = 'red';
        // Purane dBtn.onclick ko isse badal dein:
        dBtn.onclick = () => {
          pendingDeleteId = data.id; // Message ID save karein
          delModal.style.display = 'flex'; // Center modal dikhayein
          menu.style.display = 'none'; // ⋮ Menu band karein
        };
        menu.appendChild(dBtn);
      }

      // Toggle Menu Visibility
      menuBtn.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.message-menu').forEach(m => m.style.display = 'none');
        menu.style.display = 'flex';
        // Auto-position menu
        menu.style.top = isMe ? '30px' : '30px';
        if (isMe) menu.style.right = '0'; else menu.style.left = '0';
      };

      container.appendChild(msgDiv);
      container.appendChild(menuBtn);
      container.appendChild(menu);
      chatWindow.appendChild(container);

      // Auto Scroll to bottom
      chatWindow.scrollTop = chatWindow.scrollHeight;

    }





    // 🗑️ Server se aane wala delete signal receive karna
    socket.on('delete message', (msgId) => {
      const element = document.querySelector(`[data-id="${msgId}"]`);
      if (element) {
        element.style.transition = "0.3s";
        element.style.opacity = "0";
        setTimeout(() => element.remove(), 300);
      }
    });


    function setReply(sender, message) {
      replyData = { sender, message };
      replyText.textContent = `Replying to ${sender}: ${message}`;
      replyPreview.style.display = 'block';
    }

    function cancelReply() {
      replyData = null;
      replyPreview.style.display = 'none';
      replyText.textContent = '';
    }

    function resizeInput() {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    }

    input.addEventListener('input', resizeInput);

    function insertMention(name) {
      const mention = `@${name}: `;
      if (!input.value.includes(mention)) {
        input.value += mention;
        input.focus();
        resizeInput();
      }
    }

    function logout() {
      localStorage.removeItem('username');

        // Example for sendMessage:
        const msgId = Date.now().toString() + Math.random().toString(36).substr(2, 5);

        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = (e) => {
            const data = { sender: currentUser, message: e.target.result, type: 'audio' };
            socket.emit('chat message', data);

          };

    // Insert emoji at cursor
    function insertAtCursor(textarea, emoji) {
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const textBefore = textarea.value.substring(0, start);
      const textAfter = textarea.value.substring(end);

      textarea.value = textBefore + emoji + textAfter;
      textarea.selectionStart = textarea.selectionEnd = start + emoji.length;

    // 💾 Changes save karne ka function
    // 💾 Changes save karne ka function (Instant Update)
    // 💾 Settings save karne ka function (Instant Update)
    function saveSettings() {
      const newName = document.getElementById('updateName').value.trim();
      const newBio = document.getElementById('updateBio').value.trim();

      if (!newName) return alert("Name cannot be empty!");

      // 1. Storage update (Ye sabse zaruri hai refresh ke liye)
      localStorage.setItem('username', newName);
      localStorage.setItem('userBio', newBio);
      currentUser = newName;

      // 2. Server update
      socket.emit('update profile', { name: newName, bio: newBio });

      closeSettings();
    }
